# =============================================================================
#  ATS System — H2 In-Memory Profile Overrides
#  Activated by: SPRING_PROFILES_ACTIVE=h2
# =============================================================================

server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/ats_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 2525
    username: noreply@example.com
    password: password

logging:
  level:
    root: INFO
    com.example.ats: DEBUG
    org.springframework.web: DEBUG
    org.springframework.boot: DEBUG
