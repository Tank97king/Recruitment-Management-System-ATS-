# =============================================================================
#  ATS System — Main Application Configuration
#  Active Profile: default (development)
#  Secrets such as DB credentials must be set as environment variables or
#  in a .env file (which is git-ignored). Never hardcode credentials here.
# =============================================================================

spring:
  application:
    name: ats-system
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # ─── Mail (SMTP) ─────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_email@gmail.com}
    password: ${MAIL_PASSWORD:your_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ─── Database (PostgreSQL) ───────────────────────────────────────────────
  # HikariCP is the default connection pool in Spring Boot.
  # DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD must be set as
  # environment variables or overridden in application-dev.yml / docker-compose.
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ats_db}
    username: ${DB_USERNAME:ats_user}
    password: ${DB_PASSWORD:ats_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Maximum number of connections in the pool.
      # For a single-instance dev setup, 10 is more than sufficient.
      maximum-pool-size: 10
      # Minimum idle connections to maintain in the pool.
      minimum-idle: 2
      # Maximum lifetime of a connection in the pool (30 minutes).
      max-lifetime: 1800000
      # Maximum time (ms) to wait for a connection from the pool before throwing.
      connection-timeout: 30000
      pool-name: ATSHikariPool

  # ─── JPA / Hibernate ─────────────────────────────────────────────────────
  jpa:
    # hibernate.ddl-auto controls schema management:
    #   create-drop : drops and recreates schema on restart (destructive, dev only)
    #   update      : alters schema to match entities (risky in production)
    #   validate    : verifies schema matches entities, fails if mismatch (recommended with Flyway)
    #   none        : does nothing (use when Flyway manages schema entirely)
    # We use 'validate' here; Flyway will run migrations first, then Hibernate validates.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # Ensures generated SQL is formatted for readability in logs
        format_sql: true
        # Enables Hibernate statistics (useful for detecting N+1 query issues during dev)
        generate_statistics: false
        # Sets the default schema (optional; comment out if not needed)
        # default_schema: public
    # Show SQL statements in logs. Set to false in production.
    show-sql: false
    # Defer datasource initialization so Flyway runs before Hibernate validation
    defer-datasource-initialization: false
    open-in-view: false

  # ─── Flyway (Database Migrations) ────────────────────────────────────────
  # Flyway automatically scans db/migration/ for versioned SQL scripts.
  # Scripts are applied in version order: V1__, V2__, V3__, etc.
  # Once applied, scripts are checksummed and cannot be modified.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  # ─── Multipart File Upload ───────────────────────────────────────────────
  # Controls the size limits for uploaded files (e.g., candidate resumes).
  # max-file-size  : Maximum size of a single file.
  # max-request-size: Maximum size of the entire multipart HTTP request.
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB
      file-size-threshold: 2KB

  # ─── Jackson (JSON Serialization) ────────────────────────────────────────
  jackson:
    # Serialize dates as ISO-8601 strings ("2026-07-19T14:00:00Z")
    # instead of Unix timestamps. Vastly more readable for API consumers.
    serialization:
      write-dates-as-timestamps: false
    # Prevent serialization failures when unknown JSON fields are received.
    deserialization:
      fail-on-unknown-properties: false
    # Do not include null fields in JSON output. Keeps responses clean.
    default-property-inclusion: non_null
    time-zone: UTC

# ─── Server Configuration ───────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  # Graceful shutdown: waits for in-flight requests to complete before stopping.
  # This is critical for zero-downtime deployments.
  shutdown: graceful
  servlet:
    context-path: /
  error:
    # Suppress the default Spring Boot /error page HTML response.
    # All errors are handled by GlobalExceptionHandler returning JSON.
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# ─── Spring Boot Actuator ───────────────────────────────────────────────────
# Exposes operational endpoints for health checks and monitoring.
# In production, restrict exposure to only 'health'.
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
  info:
    env:
      enabled: true

# ─── Application Info (displayed on /actuator/info) ─────────────────────────
info:
  app:
    name: ATS System - Recruitment Management System
    description: Portfolio project demonstrating Spring Boot 3 + Java 21
    version: 1.0.0
    java-version: ${java.version}

# ─── Logging Configuration ──────────────────────────────────────────────────
# Logging levels control the verbosity of output.
#   ERROR   : Only critical failures
#   WARN    : Potential issues
#   INFO    : Normal business operations (default for production)
#   DEBUG   : Detailed diagnostic info (development only)
#   TRACE   : Most verbose (framework internals)
logging:
  level:
    root: INFO
    # Show our application's debug logs during development
    com.example.ats: DEBUG
    # Show Hibernate SQL queries and parameters during development
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    # Suppress noisy Spring Security debug output
    org.springframework.security: INFO
    # Suppress Flyway verbose logging
    org.flywaydb: INFO
  pattern:
    # Console pattern: timestamp [thread] LEVEL logger - message
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %-40logger{40} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %-40logger{40} - %msg%n"
  file:
    name: logs/ats-system.log

# ─── Application-specific custom properties ─────────────────────────────────
# These are read by @ConfigurationProperties beans in the config package.
app:
  # JWT configuration
  # The secret key must be at least 256 bits (32 characters) for HMAC-SHA256.
  # NEVER commit the real secret. Use environment variable JWT_SECRET in prod.
  jwt:
    secret: ${JWT_SECRET:YourSuperSecretKeyHereMustBeAtLeast256BitsLongForHMACSHA256Security}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRY_MS:3600000}       # 1 hour
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}   # 7 days

  # File storage configuration
  file:
    upload-dir: ${FILE_UPLOAD_DIR:uploads/resumes}
    allowed-extensions: pdf,doc,docx
    max-size-bytes: 5242880  # 5 MB in bytes

  # CORS configuration
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    max-age-seconds: 3600
