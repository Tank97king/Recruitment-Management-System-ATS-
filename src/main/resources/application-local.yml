# =============================================================================
#  ATS System — Local Profile Overrides
#  Activated by: SPRING_PROFILES_ACTIVE=local
# =============================================================================

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ats_db}
    username: ${DB_USERNAME:ats_user}
    password: ${DB_PASSWORD:ats_password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
